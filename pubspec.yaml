    - assets/images/universe.jpg
    - assets/images/multiverse.jpg
    - assets/images/space.jpg
    - assets/images/app_icon_final.png
    - assets/images/milky_way.jpg
    - assets/images/andromeda.jpg
    - assets/images/whirlpool.jpg
